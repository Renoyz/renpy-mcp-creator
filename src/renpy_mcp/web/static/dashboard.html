<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ren'Py Dev Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- Nav ---- */
#nav {
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  height: 44px;
  gap: 16px;
  flex-shrink: 0;
}

#nav h1 { font-size: 15px; font-weight: 600; color: #e94560; }

#nav a {
  color: #888;
  text-decoration: none;
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 4px;
  transition: background 0.2s, color 0.2s;
}

#nav a:hover, #nav a.active { color: #e0e0e0; background: #0f3460; }

.nav-spacer { flex: 1; }

#connection {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

#conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #666;
  transition: background 0.3s;
}

#conn-dot.on { background: #4ecca3; }
#conn-dot.off { background: #e94560; }

/* ---- Main grid ---- */
#main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  flex: 1;
  overflow: hidden;
}

.panel {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid #0f3460;
  font-size: 13px;
  font-weight: 600;
  color: #4ecca3;
  flex-shrink: 0;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
}

/* ---- Status panel ---- */
#current-label {
  font-size: 20px;
  font-weight: 700;
  color: #e9a045;
  margin: 8px 0;
}

#current-file {
  font-size: 12px;
  color: #666;
  margin-bottom: 12px;
}

/* ---- Variable watcher ---- */
.var-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.var-table th {
  text-align: left;
  padding: 4px 8px;
  color: #888;
  font-weight: 500;
  border-bottom: 1px solid #0f3460;
  position: sticky;
  top: 0;
  background: #16213e;
}

.var-table td {
  padding: 4px 8px;
  border-bottom: 1px solid #0f346030;
  transition: background 0.5s;
}

.var-table tr.changed td {
  background: #4ecca320;
}

.var-name { color: #4a9fd5; font-family: monospace; }
.var-value {
  color: #e0e0e0;
  font-family: monospace;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: background 0.2s;
}

.var-value:hover { background: #0f3460; }

/* Tree view for nested structures */
.tree-toggle {
  cursor: pointer;
  user-select: none;
  color: #888;
  margin-right: 4px;
  display: inline-block;
  width: 12px;
  font-size: 10px;
}
.tree-toggle:hover { color: #4ecca3; }
.tree-children {
  padding-left: 16px;
  border-left: 1px solid #0f346060;
  margin-left: 4px;
}
.tree-children.collapsed { display: none; }
.tree-key { color: #e8a838; }
.tree-type { color: #888; font-size: 10px; margin-left: 4px; }
.tree-primitive { color: #e0e0e0; }
.tree-string { color: #4ecca3; }
.tree-number { color: #a78bfa; }
.tree-bool { color: #f97316; }
.tree-null { color: #666; font-style: italic; }

.var-edit {
  background: #0f3460;
  color: #e0e0e0;
  border: 1px solid #1a4080;
  font-family: monospace;
  font-size: 12px;
  padding: 2px 4px;
  border-radius: 3px;
  width: 100%;
}

/* ---- Screenshot ---- */
#preview-container {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  position: relative;
}

#preview-img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 4px;
  image-rendering: auto;
}

#preview-placeholder {
  color: #555;
  font-size: 13px;
  text-align: center;
}

#preview-controls {
  display: flex;
  gap: 8px;
  align-items: center;
}

#auto-refresh-label {
  font-size: 11px;
  color: #888;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ---- Quick actions ---- */
.action-group {
  margin-bottom: 12px;
}

.action-group label {
  display: block;
  font-size: 11px;
  color: #888;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.action-row {
  display: flex;
  gap: 6px;
}

.action-input {
  flex: 1;
  background: #0f3460;
  color: #e0e0e0;
  border: 1px solid #1a4080;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-family: monospace;
}

.action-input::placeholder { color: #555; }

.action-btn {
  background: #0f3460;
  color: #e0e0e0;
  border: 1px solid #1a4080;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.2s;
  white-space: nowrap;
}

.action-btn:hover { background: #1a4080; }
.action-btn.primary { background: #4ecca3; color: #1a1a2e; border-color: #4ecca3; font-weight: 600; }
.action-btn.primary:hover { background: #3db890; }

select.action-input {
  cursor: pointer;
}

#eval-result {
  margin-top: 6px;
  padding: 6px 10px;
  background: #0a0a1a;
  border-radius: 4px;
  font-family: monospace;
  font-size: 12px;
  color: #4ecca3;
  min-height: 24px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 80px;
  overflow-y: auto;
}

/* ---- Toast ---- */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #4ecca3;
  color: #1a1a2e;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
  z-index: 30;
}

#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.error { background: #e94560; color: #fff; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
</style>
</head>
<body>

<div id="nav">
  <h1>Ren'Py Dev Dashboard</h1>
  <a href="/story-map">Story Map</a>
  <a href="/dashboard" class="active">Dashboard</a>
  <a href="/script-editor">Script Editor</a>
  <a href="/heatmap">Heatmap</a>
  <a href="/assets">Assets</a>
  <span class="nav-spacer"></span>
  <div id="connection">
    <div id="conn-dot"></div>
    <span id="conn-text">Checking...</span>
  </div>
</div>

<div id="main">
  <!-- Panel 1: Game State -->
  <div class="panel">
    <div class="panel-header">Game State</div>
    <div class="panel-body">
      <div id="current-label">---</div>
      <div id="current-file"></div>
      <div id="state-info" style="font-size:12px;color:#888;">Waiting for bridge connection...</div>
    </div>
  </div>

  <!-- Panel 2: Live Preview -->
  <div class="panel">
    <div class="panel-header">
      <span>Live Preview</span>
      <div id="preview-controls">
        <label id="auto-refresh-label">
          <input type="checkbox" id="auto-refresh" checked> Auto (3s)
        </label>
        <button class="action-btn" onclick="captureScreenshot()">Capture</button>
      </div>
    </div>
    <div class="panel-body" style="padding:4px;">
      <div id="preview-container">
        <div id="preview-placeholder">No screenshot yet</div>
        <img id="preview-img" style="display:none" alt="Game screenshot">
      </div>
    </div>
  </div>

  <!-- Panel 3: Variable Watcher -->
  <div class="panel">
    <div class="panel-header">
      <span>Variables</span>
      <span id="var-count" style="font-size:11px;color:#888;"></span>
    </div>
    <div class="panel-body" style="padding:0;">
      <table class="var-table">
        <thead><tr><th>Name</th><th>Value</th></tr></thead>
        <tbody id="var-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Panel 4: Quick Actions -->
  <div class="panel">
    <div class="panel-header">Quick Actions</div>
    <div class="panel-body">
      <!-- Jump -->
      <div class="action-group">
        <label>Jump to Label</label>
        <div class="action-row">
          <select id="jump-select" class="action-input">
            <option value="">Loading...</option>
          </select>
          <button class="action-btn primary" onclick="doJump()">Jump</button>
        </div>
      </div>

      <!-- Notify -->
      <div class="action-group">
        <label>Send Notification</label>
        <div class="action-row">
          <input id="notify-input" class="action-input" placeholder="Message text...">
          <button class="action-btn" onclick="doNotify()">Send</button>
        </div>
      </div>

      <!-- Eval -->
      <div class="action-group">
        <label>Evaluate Expression</label>
        <div class="action-row">
          <input id="eval-input" class="action-input" placeholder="renpy.version()">
          <button class="action-btn" onclick="doEval()">Run</button>
        </div>
        <div id="eval-result"></div>
      </div>

      <!-- Set Variable -->
      <div class="action-group">
        <label>Set Variable</label>
        <div class="action-row">
          <input id="setvar-name" class="action-input" placeholder="name" style="flex:0.4;">
          <input id="setvar-value" class="action-input" placeholder="value">
          <button class="action-btn" onclick="doSetVar()">Set</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---- State ----
let prevVars = {};
let connected = false;
let autoRefreshTimer = null;

// ---- API helpers ----
async function api(method, path, body) {
  const opts = { method };
  if (body) {
    opts.headers = { "Content-Type": "application/json" };
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(path, opts);
  return resp.json();
}

// ---- Status polling ----
async function pollStatus() {
  try {
    const data = await api("GET", "/api/status");
    connected = data.connected;
    const dot = document.getElementById("conn-dot");
    const text = document.getElementById("conn-text");
    dot.className = connected ? "on" : "off";
    text.textContent = connected ? "Bridge connected" : "Bridge offline";
  } catch {
    connected = false;
    document.getElementById("conn-dot").className = "off";
    document.getElementById("conn-text").textContent = "Server error";
  }
}

// ---- Game state polling ----
async function pollState() {
  if (!connected) return;
  try {
    const data = await api("GET", "/api/state");
    if (data.success) {
      document.getElementById("current-label").textContent = data.current_label || "---";
      document.getElementById("current-file").textContent = data.current_file || "";
      document.getElementById("state-info").textContent = "";

      // Update variables
      const vars = data.variables || {};
      updateVariableTable(vars);
    }
  } catch {}
}

function renderValue(val) {
  if (val === null || val === undefined) return `<span class="tree-null">None</span>`;
  if (typeof val === "boolean") return `<span class="tree-bool">${val ? "True" : "False"}</span>`;
  if (typeof val === "number") return `<span class="tree-number">${val}</span>`;
  if (typeof val === "string") return `<span class="tree-string">"${esc(val)}"</span>`;

  if (val && val._type) {
    const type = val._type;
    const items = val.items;
    if (type === "dict") {
      const keys = Object.keys(items);
      if (keys.length === 0) return `<span class="tree-primitive">{}</span>`;
      const id = "tree-" + Math.random().toString(36).slice(2, 8);
      let html = `<span class="tree-toggle" onclick="this.textContent=this.textContent==='▶'?'▼':'▶';document.getElementById('${id}').classList.toggle('collapsed')">▶</span>`;
      html += `<span class="tree-type">dict(${keys.length})</span>`;
      html += `<div id="${id}" class="tree-children collapsed">`;
      for (const k of keys) {
        html += `<div><span class="tree-key">${esc(k)}</span>: ${renderValue(items[k])}</div>`;
      }
      html += `</div>`;
      return html;
    }
    if (type === "list" || type === "tuple" || type === "set") {
      const arr = items;
      const bracket = type === "set" ? ["{", "}"] : type === "tuple" ? ["(", ")"] : ["[", "]"];
      if (arr.length === 0) return `<span class="tree-primitive">${bracket[0]}${bracket[1]}</span>`;
      const id = "tree-" + Math.random().toString(36).slice(2, 8);
      let html = `<span class="tree-toggle" onclick="this.textContent=this.textContent==='▶'?'▼':'▶';document.getElementById('${id}').classList.toggle('collapsed')">▶</span>`;
      html += `<span class="tree-type">${type}(${arr.length})</span>`;
      html += `<div id="${id}" class="tree-children collapsed">`;
      for (let i = 0; i < arr.length; i++) {
        html += `<div><span class="tree-key">${i}</span>: ${renderValue(arr[i])}</div>`;
      }
      html += `</div>`;
      return html;
    }
  }
  return `<span class="tree-primitive">${esc(String(val))}</span>`;
}

function isComplex(val) {
  return val && typeof val === "object" && val._type;
}

function updateVariableTable(vars) {
  const tbody = document.getElementById("var-body");
  const count = document.getElementById("var-count");
  const entries = Object.entries(vars).sort((a, b) => a[0].localeCompare(b[0]));
  count.textContent = `${entries.length} vars`;

  const existing = {};
  for (const row of tbody.querySelectorAll("tr")) {
    existing[row.dataset.name] = row;
  }

  const seen = new Set();
  for (const [name, value] of entries) {
    seen.add(name);
    const valStr = typeof value === "string" ? value : JSON.stringify(value);
    const changed = prevVars[name] !== undefined && prevVars[name] !== valStr;

    if (existing[name]) {
      const row = existing[name];
      const valCell = row.querySelector(".var-value");
      if (valCell && valStr !== prevVars[name]) {
        if (isComplex(value)) {
          valCell.innerHTML = renderValue(value);
          valCell.removeAttribute("onclick");
        } else {
          valCell.innerHTML = renderValue(value);
          valCell.setAttribute("onclick", `editVar(this, '${esc(name)}')`);
        }
        if (changed) {
          row.classList.add("changed");
          setTimeout(() => row.classList.remove("changed"), 1500);
        }
      }
    } else {
      const row = document.createElement("tr");
      row.dataset.name = name;
      const nameCell = `<td class="var-name">${esc(name)}</td>`;
      if (isComplex(value)) {
        row.innerHTML = `${nameCell}<td class="var-value">${renderValue(value)}</td>`;
      } else {
        row.innerHTML = `${nameCell}<td class="var-value" onclick="editVar(this, '${esc(name)}')">${renderValue(value)}</td>`;
      }
      tbody.appendChild(row);
    }
    prevVars[name] = valStr;
  }

  for (const name of Object.keys(existing)) {
    if (!seen.has(name)) {
      existing[name].remove();
      delete prevVars[name];
    }
  }
}

function editVar(cell, name) {
  const current = cell.textContent;
  const input = document.createElement("input");
  input.className = "var-edit";
  input.value = current;
  cell.textContent = "";
  cell.appendChild(input);
  input.focus();
  input.select();

  async function commit() {
    const newVal = input.value;
    cell.textContent = current; // restore while waiting
    if (newVal !== current) {
      const result = await api("POST", "/api/variable", { name, value: newVal });
      if (result.success) {
        cell.textContent = newVal;
        toast("Variable set: " + name);
      } else {
        toast("Error: " + (result.error || "failed"), true);
      }
    }
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); commit(); }
    if (e.key === "Escape") { cell.textContent = current; }
  });
  input.addEventListener("blur", commit);
}

// ---- Screenshot ----
async function captureScreenshot() {
  try {
    const data = await api("GET", "/api/screenshot");
    if (data.success && data.image) {
      const img = document.getElementById("preview-img");
      const placeholder = document.getElementById("preview-placeholder");
      img.src = "data:image/png;base64," + data.image;
      img.style.display = "block";
      placeholder.style.display = "none";
    }
  } catch {}
}

function toggleAutoRefresh() {
  if (autoRefreshTimer) {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
  }
  if (document.getElementById("auto-refresh").checked) {
    autoRefreshTimer = setInterval(() => {
      if (connected) captureScreenshot();
    }, 3000);
  }
}

// ---- Quick actions ----
async function loadLabels() {
  try {
    const data = await api("GET", "/api/labels");
    const select = document.getElementById("jump-select");
    select.innerHTML = "";
    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "-- Select label --";
    select.appendChild(opt0);
    for (const label of (data.labels || [])) {
      const opt = document.createElement("option");
      opt.value = label;
      opt.textContent = label;
      select.appendChild(opt);
    }
  } catch {}
}

async function doJump() {
  const label = document.getElementById("jump-select").value;
  if (!label) return;
  const result = await api("POST", "/api/jump", { label });
  if (result.success) toast("Jump queued: " + label);
  else toast("Error: " + (result.error || "failed"), true);
}

async function doNotify() {
  const input = document.getElementById("notify-input");
  const message = input.value.trim();
  if (!message) return;
  const result = await api("POST", "/api/notify", { message });
  if (result.success) { toast("Notification sent"); input.value = ""; }
  else toast("Error: " + (result.error || "failed"), true);
}

async function doEval() {
  const input = document.getElementById("eval-input");
  const expression = input.value.trim();
  if (!expression) return;
  const resultEl = document.getElementById("eval-result");
  resultEl.textContent = "Evaluating...";
  const result = await api("POST", "/api/eval", { expression });
  if (result.success) {
    resultEl.textContent = result.result || "(None)";
    resultEl.style.color = "#4ecca3";
  } else {
    resultEl.textContent = result.error || "Error";
    resultEl.style.color = "#e94560";
  }
}

async function doSetVar() {
  const name = document.getElementById("setvar-name").value.trim();
  const value = document.getElementById("setvar-value").value.trim();
  if (!name) return;
  const result = await api("POST", "/api/variable", { name, value });
  if (result.success) toast("Set: " + name + " = " + value);
  else toast("Error: " + (result.error || "failed"), true);
}

// ---- Toast ----
function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = isError ? "show error" : "show";
  setTimeout(() => el.className = "", 2500);
}

// ---- Utils ----
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ---- Enter key handlers ----
document.getElementById("notify-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doNotify();
});
document.getElementById("eval-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doEval();
});
document.getElementById("auto-refresh").addEventListener("change", toggleAutoRefresh);

// ---- Init ----
pollStatus();
loadLabels();
setInterval(pollStatus, 3000);
setInterval(pollState, 2000);
toggleAutoRefresh();
</script>
</body>
</html>
