<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ren'Py Asset Manager</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Nav */
#nav {
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  height: 44px;
  gap: 16px;
  flex-shrink: 0;
}

#nav h1 { font-size: 15px; font-weight: 600; color: #e94560; }
#nav a { color: #888; text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 4px; transition: background 0.2s, color 0.2s; }
#nav a:hover, #nav a.active { color: #e0e0e0; background: #0f3460; }
.nav-spacer { flex: 1; }

/* Toolbar */
#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  gap: 4px;
}

.filter-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid #1a4080;
  background: #0f3460;
  color: #aaa;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.2s;
}

.filter-btn.active { background: #4ecca3; color: #1a1a2e; border-color: #4ecca3; font-weight: 600; }
.filter-btn:hover:not(.active) { background: #1a4080; color: #e0e0e0; }

#search {
  background: #0f3460;
  color: #e0e0e0;
  border: 1px solid #1a4080;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  width: 180px;
}

#search::placeholder { color: #555; }

.toolbar-spacer { flex: 1; }

#summary-bar {
  font-size: 11px;
  color: #888;
  display: flex;
  gap: 12px;
}

.summary-item { display: flex; align-items: center; gap: 4px; }
.summary-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Sort select */
#sort-select {
  background: #0f3460;
  color: #e0e0e0;
  border: 1px solid #1a4080;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
}

/* Main grid */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

/* Asset card */
.card {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
}

.card:hover { border-color: #4ecca3; transform: translateY(-2px); }
.card.unused { border-color: #e9456040; }

.card-preview {
  width: 100%;
  height: 120px;
  background: #0a0a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.card-preview img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.card-icon {
  font-size: 32px;
  color: #333;
}

.card-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
}

.badge-unused { background: #e94560; color: #fff; }
.badge-oversized { background: #e9a045; color: #1a1a2e; }
.badge-gui { background: #0f3460; color: #888; }

.card-info {
  padding: 8px 10px;
}

.card-name {
  font-size: 12px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 2px;
}

.card-meta {
  font-size: 10px;
  color: #888;
  display: flex;
  justify-content: space-between;
}

.card-dim { color: #4ecca3; }

/* Audio player */
.audio-card .card-preview {
  height: 80px;
  flex-direction: column;
  gap: 8px;
}

.audio-icon { font-size: 24px; color: #1abc9c; }

.mini-player {
  display: flex;
  align-items: center;
  gap: 6px;
}

.play-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #1abc9c;
  border: none;
  color: #1a1a2e;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.play-btn:hover { background: #16a085; }

/* Detail modal */
#detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

#detail-overlay.open { display: flex; }

#detail-panel {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 10px;
  width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid #0f3460;
}

#detail-title { font-size: 16px; font-weight: 600; }

#detail-close {
  background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 4px;
}

#detail-close:hover { color: #e0e0e0; }

#detail-preview {
  background: #0a0a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  max-height: 400px;
  padding: 16px;
}

#detail-preview img {
  max-width: 100%;
  max-height: 360px;
  object-fit: contain;
  border-radius: 4px;
}

#detail-body { padding: 16px; }

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid #0f346030;
}

.detail-label { color: #888; }
.detail-value { color: #e0e0e0; font-family: monospace; }

.usage-section {
  margin-top: 12px;
}

.usage-title {
  font-size: 12px;
  font-weight: 600;
  color: #4ecca3;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.usage-item {
  font-size: 12px;
  padding: 4px 8px;
  margin-bottom: 2px;
  background: #0f346030;
  border-radius: 3px;
  font-family: monospace;
  color: #aaa;
}

.usage-empty {
  font-size: 12px;
  color: #555;
  font-style: italic;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
</style>
</head>
<body>

<div id="nav">
  <h1>Ren'Py Asset Manager</h1>
  <a href="/story-map">Story Map</a>
  <a href="/script-editor">Script Editor</a>
  <a href="/heatmap">Heatmap</a>
  <a href="/assets" class="active">Assets</a>
  <span class="nav-spacer"></span>
</div>

<div id="toolbar">
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="image" onclick="setFilter('image')">Images</button>
    <button class="filter-btn" data-filter="audio" onclick="setFilter('audio')">Audio</button>
    <button class="filter-btn" data-filter="video" onclick="setFilter('video')">Video</button>
  </div>
  <div class="filter-group">
    <button class="filter-btn" data-filter="unused" onclick="toggleUnused()">Unused Only</button>
  </div>
  <input id="search" type="text" placeholder="Search assets..." oninput="renderGrid()">
  <select id="sort-select" onchange="renderGrid()">
    <option value="name">Sort: Name</option>
    <option value="size-desc">Sort: Size (large first)</option>
    <option value="size-asc">Sort: Size (small first)</option>
    <option value="type">Sort: Type</option>
  </select>
  <span class="toolbar-spacer"></span>
  <div id="summary-bar"></div>
</div>

<div id="content">
  <div id="grid"></div>
</div>

<div id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div id="detail-panel">
    <div id="detail-header">
      <span id="detail-title"></span>
      <button id="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div id="detail-preview"></div>
    <div id="detail-body"></div>
  </div>
</div>

<script>
let allAssets = [];
let summary = {};
let currentFilter = "all";
let showUnusedOnly = false;
let currentAudio = null;
let currentProjectName = "";

async function init() {
  const projResp = await fetch("/api/projects/current");
  const projData = await projResp.json();
  currentProjectName = projData.current_project?.name || "";
  if (!currentProjectName) {
    document.getElementById("grid").innerHTML = '<div style="padding:20px;color:#888">No active project selected.</div>';
    return;
  }
  await init();
}

async function loadAssets() {
  const resp = await fetch("/api/assets");
  const data = await resp.json();
  allAssets = data.assets || [];
  summary = data.summary || {};
  updateSummary();
  renderGrid();
}

function updateSummary() {
  const bar = document.getElementById("summary-bar");
  bar.innerHTML = `
    <span class="summary-item"><span class="summary-dot" style="background:#4a6fa5"></span> ${summary.images || 0} images</span>
    <span class="summary-item"><span class="summary-dot" style="background:#1abc9c"></span> ${summary.audio || 0} audio</span>
    <span class="summary-item"><span class="summary-dot" style="background:#9b59b6"></span> ${summary.video || 0} video</span>
    <span class="summary-item" style="color:#e94560">${summary.unused || 0} unused</span>
    <span class="summary-item">${(summary.total_size_kb / 1024).toFixed(1)} MB total</span>
    <span class="summary-item">Resolution: ${summary.screen_resolution || "?"}</span>
  `;
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn[data-filter]").forEach(b => {
    if (b.dataset.filter !== "unused")
      b.classList.toggle("active", b.dataset.filter === filter);
  });
  renderGrid();
}

function toggleUnused() {
  showUnusedOnly = !showUnusedOnly;
  document.querySelector('[data-filter="unused"]').classList.toggle("active", showUnusedOnly);
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort-select").value;

  let filtered = allAssets.filter(a => {
    if (currentFilter !== "all" && a.category !== currentFilter) return false;
    if (showUnusedOnly && (a.is_used || a.is_gui)) return false;
    if (search && !a.name.toLowerCase().includes(search) && !a.path.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    switch (sort) {
      case "size-desc": return b.size_kb - a.size_kb;
      case "size-asc": return a.size_kb - b.size_kb;
      case "type": return a.category.localeCompare(b.category) || a.name.localeCompare(b.name);
      default: return a.name.localeCompare(b.name);
    }
  });

  grid.innerHTML = filtered.map(a => createCard(a)).join("");
}

function createCard(asset) {
  const isImage = asset.category === "image";
  const isAudio = asset.category === "audio";
  const encodedPath = encodeURIComponent(asset.path);

  let badges = "";
  if (!asset.is_used && !asset.is_gui) badges += '<span class="card-badge badge-unused">UNUSED</span>';
  if (asset.size_warning === "oversized") badges += '<span class="card-badge badge-oversized">LARGE</span>';
  if (asset.is_gui) badges += '<span class="card-badge badge-gui">GUI</span>';

  let preview;
  if (isImage) {
    preview = `<img src="/api/projects/${encodeURIComponent(currentProjectName)}/asset-file/${encodedPath}" loading="lazy" alt="${esc(asset.name)}">`;
  } else if (isAudio) {
    preview = `
      <div class="audio-icon">&#9835;</div>
      <div class="mini-player">
        <button class="play-btn" onclick="event.stopPropagation();toggleAudio('${encodedPath}',this)" title="Play/Pause">&#9654;</button>
        <span style="font-size:10px;color:#888">${asset.ext}</span>
      </div>`;
  } else {
    preview = `<div class="card-icon">&#9654;</div>`;
  }

  let dim = "";
  if (asset.width && asset.height) dim = `<span class="card-dim">${asset.width}&times;${asset.height}</span>`;

  const unusedClass = (!asset.is_used && !asset.is_gui) ? " unused" : "";
  const audioClass = isAudio ? " audio-card" : "";

  return `
    <div class="card${unusedClass}${audioClass}" onclick="showDetail('${esc(asset.path)}')">
      <div class="card-preview">${preview}${badges}</div>
      <div class="card-info">
        <div class="card-name" title="${esc(asset.path)}">${esc(asset.name)}${asset.ext}</div>
        <div class="card-meta">
          <span>${asset.size_kb < 1024 ? asset.size_kb + ' KB' : (asset.size_kb/1024).toFixed(1) + ' MB'}</span>
          ${dim}
        </div>
      </div>
    </div>`;
}

// Audio playback
function toggleAudio(path, btn) {
  if (currentAudio && currentAudio.dataset.path === path) {
    if (currentAudio.paused) {
      currentAudio.play();
      btn.innerHTML = "&#9646;&#9646;";
    } else {
      currentAudio.pause();
      btn.innerHTML = "&#9654;";
    }
    return;
  }

  if (currentAudio) {
    currentAudio.pause();
    // Reset previous button
    document.querySelectorAll(".play-btn").forEach(b => b.innerHTML = "&#9654;");
  }

  const audio = new Audio(`/api/projects/${encodeURIComponent(currentProjectName)}/asset-file/${path}`);
  audio.dataset.path = path;
  audio.play();
  btn.innerHTML = "&#9646;&#9646;";
  currentAudio = audio;

  audio.addEventListener("ended", () => {
    btn.innerHTML = "&#9654;";
    currentAudio = null;
  });
}

// Detail modal
async function showDetail(path) {
  const asset = allAssets.find(a => a.path === path);
  if (!asset) return;

  document.getElementById("detail-title").textContent = asset.name + asset.ext;

  const preview = document.getElementById("detail-preview");
  const encodedPath = encodeURIComponent(asset.path);
  if (asset.category === "image") {
    preview.innerHTML = `<img src="/api/projects/${encodeURIComponent(currentProjectName)}/asset-file/${encodedPath}" alt="${esc(asset.name)}">`;
  } else if (asset.category === "audio") {
    preview.innerHTML = `<audio controls src="/api/projects/${encodeURIComponent(currentProjectName)}/asset-file/${encodedPath}" style="width:80%;"></audio>`;
  } else {
    preview.innerHTML = `<video controls src="/api/projects/${encodeURIComponent(currentProjectName)}/asset-file/${encodedPath}" style="max-width:100%;max-height:300px;"></video>`;
  }

  let body = `
    <div class="detail-row"><span class="detail-label">Path</span><span class="detail-value">${esc(asset.path)}</span></div>
    <div class="detail-row"><span class="detail-label">Size</span><span class="detail-value">${asset.size_kb < 1024 ? asset.size_kb + ' KB' : (asset.size_kb/1024).toFixed(1) + ' MB'}</span></div>
    <div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">${asset.category} (${asset.ext})</span></div>`;

  if (asset.width && asset.height) {
    body += `<div class="detail-row"><span class="detail-label">Dimensions</span><span class="detail-value">${asset.width} &times; ${asset.height}</span></div>`;
  }

  body += `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:${asset.is_used || asset.is_gui ? '#4ecca3' : '#e94560'}">${asset.is_gui ? 'GUI asset' : asset.is_used ? 'In use' : 'UNUSED'}</span></div>`;

  if (asset.size_warning) {
    body += `<div class="detail-row"><span class="detail-label">Warning</span><span class="detail-value" style="color:#e9a045">${asset.size_warning === 'oversized' ? 'Image exceeds 2x screen resolution' : asset.size_warning}</span></div>`;
  }

  // Usage locations
  body += '<div class="usage-section"><div class="usage-title">Script References</div>';
  if (asset.usage && asset.usage.length > 0) {
    body += asset.usage.map(u => `<div class="usage-item">${esc(u)}</div>`).join("");
  } else {
    // Fetch detailed usage
    try {
      const resp = await fetch(`/api/asset-usage?name=${encodeURIComponent(asset.name)}`);
      const data = await resp.json();
      if (data.locations && data.locations.length > 0) {
        body += data.locations.map(l => `<div class="usage-item">${esc(l.file)}:${l.line} — ${esc(l.text)}</div>`).join("");
      } else {
        body += '<div class="usage-empty">No script references found</div>';
      }
    } catch {
      body += '<div class="usage-empty">Could not load usage data</div>';
    }
  }
  body += '</div>';

  document.getElementById("detail-body").innerHTML = body;
  document.getElementById("detail-overlay").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

loadAssets();
</script>
</body>
</html>
