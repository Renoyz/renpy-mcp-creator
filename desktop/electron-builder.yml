appId: com.renpymcp.creator
productName: RenPy MCP Creator
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: ../packaging/dist/renpy-mcp-electron
    to: backend
win:
  target:
    - nsis
  artifactName: "${productName} Setup ${version}.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
